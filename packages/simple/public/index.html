<script type="text/babel">

  /**
   * 解析 GitLab 风格的 URL 哈希片段，提取项目路径、提交哈希和文件路径等信息
   * @param {string} hash - 完整的 URL 哈希片段，例如 "#/gitlab/FlightMobile/Flight-BookingPage/commits/d2f5d1b3f1decb183f5c850e0b9a34bb4fa76d58/-/filepath.js"
   * @returns {Object} 包含解析后参数的对象
   */
  function parseGitLabHash(hash) {
    // 移除开头的 # 符号
    if (hash.startsWith('#')) {
      hash = hash.substring(1);
    }

    // 解析路径部分
    const parts = hash.split('/').filter(part => part.length > 0);
    const result = {
      platform: null,
      projectNamespace: null,
      projectName: null,
      action: null,
      commitHash: null,
      filePath: null,
      fullProjectPath: null,
      raw: hash
    };

    // 至少需要有 platform 和 projectNamespace
    if (parts.length < 2) {
      return result;
    }

    // 提取平台信息 (如 gitlab)
    result.platform = parts[0];

    // 提取项目命名空间和名称
    // 假设项目路径至少有两级 (namespace/project)
    if (parts.length >= 3) {
      // 项目命名空间 (可能包含斜杠，如 group/subgroup)
      result.projectNamespace = parts[1];

      // 项目名称
      result.projectName = parts[2];

      // 完整项目路径
      result.fullProjectPath = `${result.projectNamespace}/${result.projectName}`;
    }

    // 提取动作类型 (如 commits, tree 等)
    if (parts.length >= 4) {
      result.action = parts[3];
    }

    // 提取提交哈希
    if (result.action === 'commits' && parts.length >= 5) {
      result.commitHash = parts[4];
    }

    // 提取文件路径
    // 文件路径通常在 "/-" 之后
    const dashIndex = parts.indexOf('-');
    if (dashIndex !== -1 && dashIndex < parts.length - 1) {
      result.filePath = parts.slice(dashIndex + 1).join('/');
    }

    return result;
  }

  const hash = window.location.hash;

  const parsed = parseGitLabHash(hash);

  console.log('解析结果:', parsed);

  // /#/gitlab/FlightMobile/Flight-BookingPage/commits/d2f5d1b3f1decb183f5c850e0b9a34bb4fa76d58/-/filepath.js

  const {
    fullProjectPath:coreFullProjectPath,
    commitHash:coreCommitHash,
    filePath:coreFilePath
  } = parsed

  function getDecode(str) {
    return decodeURIComponent(
      atob(str)
        .split('')
        .map(function (c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        })
        .join(''),
    );
  }

  function handleSelectFile({
                              repoID,
                              sha,
                              filepath,
                              reportID,
                              buildID,
                              buildProvider,
                            }) {
    const fileContentRequest = axios
      .get(`/api/code`, {
        params: {
          repoID: repoID,
          sha: sha,
          filepath: filepath,
        },
      })
      .then(({ data }) => data);
    const fileCoverageRequest = axios
      .get(`/api/coverage/map`, {
        params: {
          repoID,
          reportID: reportID,
          sha: sha,
          filepath: filepath,
          provider: 'gitlab',
          buildProvider,
          buildID,
        },
      })
      .then(({ data }) => {
        return data[filepath || '']
      });
    return Promise.all([
      fileContentRequest,
      fileCoverageRequest,
    ]).then(([fileContent, fileCoverage, fileCodeChange]) => {
      return {
        fileContent: getDecode(fileContent.content),
        fileCoverage: fileCoverage,
        fileCodeChange:[]
      };
    });
  }



  axios.get(`/api/coverage/summary/map?sha=${coreCommitHash}`).then(r=>{


    const { createRoot } = ReactDOM;
    const { useEffect,useState } = React;
    const { ConfigProvider } = antd;
    const dataSource = window.data;
    const reportName = window.reportName;
    const date = window.date;
    const dynamicLoadingSource = (val) => {
      return new Promise((resolve) => {
        if (!val.includes(".")) {
          resolve({
            fileCoverage: undefined,
            fileContent: undefined,
            fileCodeChange: [],
          });
        } else {
          return handleSelectFile({
            repoID: coreFullProjectPath,
            sha: coreCommitHash,
            filepath: val,
            reportID: '',
            buildID: '',
            buildProvider: 'gitlab',
          }).then(r3=>{
            resolve(r3)
          })
        }
      });
    };

    function App() {
      const [value, setValue] = useState(coreFilePath||'');
      const onSelect = (val) => {
        window.location.hash = window.location.hash.split('/-/')[0] + '/-/' + val;
        return dynamicLoadingSource(val).then((r) => {
          setValue(val);
          return r;
        });
      };
      return (
        <div className={"p-[10px] pb-0"}>
          <div style={{ minHeight: "calc(100vh - 50px)" }}>
            <ConfigProvider
              theme={{
                token: {
                  colorPrimary: "#0071c2",
                },
                // algorithm: isDark ? [darkAlgorithm] : [],
              }}
            >
              <CanyonReport
                name={reportName}
                dataSource={r.data}
                onSelect={onSelect}
                value={value}
              />
            </ConfigProvider>
          </div>
          <footer
            style={{

            at {date}

        </div>
      );
    }
    createRoot(document.getElementById("root")).render(
