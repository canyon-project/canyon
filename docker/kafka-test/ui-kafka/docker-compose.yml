version: "3"
services:
  kafka-ui:
    restart: always
    image: provectuslabs/kafka-ui:latest
    network_mode: "bridge"
    container_name: kafka-ui
    ports:
      - 9001:8080
    environment:
      # 集群名称
      - KAFKA_CLUSTERS_0_NAME=local
      # 集群地址
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=192.168.2.104:9004 #替换成你自己的IP
