name: Test Agent Service

on:
  push:
    paths:
      - 'tools/agent/**'
  pull_request:
    paths:
      - 'tools/agent/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/agent -> target

      - name: Check formatting
        run: |
          cd tools/agent
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cd tools/agent
          cargo clippy -- -D warnings

      - name: Build
        run: |
          cd tools/agent
          cargo build --verbose

      - name: Run tests
        run: |
          cd tools/agent
          cargo test --verbose