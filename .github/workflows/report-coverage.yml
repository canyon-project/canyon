name: Report Test Coverage

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: pnpm install
      - run: ppm run test
      - run: |
          if [ ! -f "packages/frontend/coverage/coverage-final.json" ]; then
            echo "Coverage file not found!"
            exit 1
          fi

          node report-coverage.js
